<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px; overflow: hidden;
    font-family: 'Inter', 'Noto Sans SC', sans-serif;
    background: #0d1117;
  }
  .container {
    width: 100%; height: 100%;
    padding: 64px 120px;
    background: #0d1117;
    display: flex; flex-direction: column;
  }
  .header {
    display: flex; align-items: baseline; gap: 16px;
    margin-bottom: 48px;
  }
  h2 {
    font-size: 40px; font-weight: 800; color: #ffffff;
    letter-spacing: -1px;
  }
  .subtitle {
    font-size: 18px; color: #6e7681;
    font-weight: 400;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
    flex: 1;
  }
  .card {
    background: #161b22;
    border: 1px solid #21262d;
    border-radius: 12px;
    padding: 32px 36px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--accent);
    border-radius: 12px 12px 0 0;
  }
  .card-icon {
    width: 48px; height: 48px;
    background: color-mix(in srgb, var(--accent) 15%, transparent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    color: var(--accent);
    margin-bottom: 20px;
    font-weight: 700;
  }
  .card-title {
    font-size: 22px; font-weight: 700;
    color: #e6edf3;
    margin-bottom: 10px;
  }
  .card-desc {
    font-size: 15px; color: #8b949e;
    line-height: 1.6;
  }
  .card-tag {
    position: absolute;
    top: 20px; right: 20px;
    background: color-mix(in srgb, var(--accent) 12%, transparent);
    border: 1px solid color-mix(in srgb, var(--accent) 25%, transparent);
    color: var(--accent);
    font-size: 11px; font-weight: 600;
    padding: 3px 10px; border-radius: 20px;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h2>核心特性</h2>
    <span class="subtitle">{{FEATURE_COUNT}} key capabilities</span>
  </div>
  <div class="grid">
    {{FEATURE_CARDS}}
  </div>
</div>
</body>
</html>
